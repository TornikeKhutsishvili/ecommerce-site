<!-- top -->

<hr>

<section class="toolbar d-flex justify-content-center">
  <!-- navbar -->
  <nav class="nav navbar navbar-expand-lg main-navbar">
    <ul class="nav-list navbar-nav mx-auto">
      <li class="nav-item">
        <a class="nav-link"
          [routerLink]="['/admin/dashboard']"
          [routerLinkActive]="['active']"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          🏠 {{ 'Dashboard' | translate }}
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link"
          [routerLink]="['/admin/dashboard-analytics']"
          [routerLinkActive]="['active']"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          📊 {{ 'Analytics' | translate }}
        </a>
      </li>
    </ul>
  </nav>
</section>

<hr>


<!-- content -->
@if (product(); as p) {
  <form class="card p-top-16 p-right-16 p-bottom-16 p-left-16 my-5 bord-radius-16"
        (ngSubmit)="updateProduct()"
  >
    <h2>✏ {{ 'Edit Product' | translate }} · #{{ p.id }}</h2>

    <div class="grid">
      <label class="f-weight-600">
        {{'Title' | translate }}
        <input
          class="p-top-10 p-right-11 p-bottom-10 p-left-11 bord-radius-10"
          name="title"
          [(ngModel)]="p.title"
          (ngModelChange)="onTitleChange($event)"
          required
      />
      </label>

      <label class="f-weight-600">
        {{ 'Price' | translate }}
        <input
          class="p-top-10 p-right-11 p-bottom-10 p-left-11 bord-radius-10"
          name="price"
          type="number"
          min="0"
          [(ngModel)]="p.price"
          (ngModelChange)="onPriceChange($event)"
          required
      />
      </label>

      <label class="f-weight-600">
        {{ 'Category' | translate }}
        <input
          class="p-top-10 p-right-11 p-bottom-10 p-left-11 bord-radius-10"
          name="category"
          [(ngModel)]="p.category"
          (ngModelChange)="onCategoryChange($event)"
      />
      </label>

      <label class="f-weight-600">
        {{ 'Image URL' | translate }}
        <input
          class="p-top-10 p-right-11 p-bottom-10 p-left-11 bord-radius-10"
          name="image"
          [(ngModel)]="p.thumbnail"
          (ngModelChange)="onThumbChange($event)"
      />
      </label>

      <label class="col-span f-weight-600">
        {{ 'Description' | translate }}
        <textarea
          class="p-top-10 p-right-11 p-bottom-10 p-left-11 bord-radius-10"
          name="description"
          rows="4"
          [(ngModel)]="p.description"
          (ngModelChange)="onDescChange($event)"
        >
        </textarea>
      </label>
    </div>

    <div class="actions m-top-12">
      <button type="submit"
              class="text-white bord-radius-10 p-top-8 p-right-14 p-bottom-8 p-left-14"
      >
        {{ 'Save changes' | translate }}
      </button>
      <button type="button"
              class="btn-secondary bord-radius-10 p-top-8 p-right-14 p-bottom-8 p-left-14"
              [routerLink]="['/admin/dashboard']"
      >
        {{ 'Cancel' | translate }}
      </button>
    </div>
  </form>
}

<!-- toasts -->
<app-accept-toasts #acceptToast></app-accept-toasts>
<app-alert-toasts #alertToast></app-alert-toasts>
<app-delete-toasts #deleteToast></app-delete-toasts>
<app-add-toasts #addToast></app-add-toasts>
